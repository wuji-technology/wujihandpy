name: Release Package CI

on:
  push:
    tags: ["v*"]

jobs:
  wujihandcpp-package:
    name: Build wujihandcpp packages
    uses: ./.github/workflows/wujihandcpp-package-build.yml

  wujihandpy-wheel:
    name: Build wujihandpy wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:          
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies with vcpkg (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -eq "windows-latest") {
            $VCPKG_TRIPLET = "x64-windows"
          } elseif ("${{ matrix.os }}" -eq "windows-11-arm") {
            $VCPKG_TRIPLET = "arm64-windows"
          }
          echo "VCPKG_TRIPLET=$VCPKG_TRIPLET" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          vcpkg install libusb:$VCPKG_TRIPLET

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wujihandpy (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: python -m cibuildwheel --output-dir build/wujihandpy

      - name: Build wujihandpy (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: pwsh
        run: |
          $VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT -replace '\\','/'
          $env:CIBW_ENVIRONMENT_WINDOWS = "VCPKG_ROOT=$VCPKG_ROOT VCPKG_TRIPLET=$env:VCPKG_TRIPLET"
          python -m cibuildwheel --output-dir build/wujihandpy

      - uses: actions/upload-artifact@v4
        with:
          name: build-wujihandpy-${{ matrix.os }}
          path: build/wujihandpy/*.whl

  deb-smoke-test:
    name: Smoke test wujihandcpp deb (${{ matrix.runner }}, ${{ matrix.environment }}, spdlog=${{ matrix.install_system_spdlog }})
    needs: wujihandcpp-package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
        environment: [host, ubuntu-container]
        install_system_spdlog: [false, true]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download wujihandcpp build
        uses: actions/download-artifact@v5
        with:
          path: build/wujihandcpp
          name: build-wujihandcpp-${{ matrix.runner }}

      - name: Resolve deb package
        id: deb
        run: |
          mapfile -t debs < <(find build/wujihandcpp -maxdepth 1 -type f -name '*.deb' | sort)
          if [[ "${#debs[@]}" -ne 1 ]]; then
            printf 'Expected exactly one deb package, found %s:\n' "${#debs[@]}"
            printf '  %s\n' "${debs[@]}"
            exit 1
          fi
          echo "path=${debs[0]}" >> "${GITHUB_OUTPUT}"

      - name: Smoke test on GitHub runner
        if: matrix.environment == 'host'
        run: .github/scripts/smoke_wujihandcpp_deb.sh "${{ steps.deb.outputs.path }}" "${{ matrix.install_system_spdlog }}"

      - name: Smoke test in minimal Ubuntu container
        if: matrix.environment == 'ubuntu-container'
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:${GITHUB_WORKSPACE}" \
            -w "${GITHUB_WORKSPACE}" \
            ubuntu:24.04 \
            .github/scripts/smoke_wujihandcpp_deb.sh "${{ steps.deb.outputs.path }}" "${{ matrix.install_system_spdlog }}"

  publish:
    name: Publish to PyPI
    needs: [wujihandpy-wheel, wujihandcpp-package, deb-smoke-test]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/wujihandpy
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Auto Release
        id: changelog
        uses: wuji-technology/.github/actions/auto-release@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download wujihandcpp builds
        uses: actions/download-artifact@v5
        with:
          path: build/wujihandcpp
          pattern: build-wujihandcpp-*
          merge-multiple: true

      - name: Download wujihandpy builds
        uses: actions/download-artifact@v5
        with:
          path: build/wujihandpy
          pattern: build-wujihandpy-*
          merge-multiple: true

      - name: Publish distribution to PyPI
        if: github.ref_type == 'tag'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: build/wujihandpy

      - name: Upload Release Assets
        run: gh release upload ${{ github.ref_name }} build/wujihandcpp/* build/wujihandpy/*.whl --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
