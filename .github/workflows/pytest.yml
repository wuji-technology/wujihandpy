name: pytest

# Run host-side pytest on PRs; hardware-in-the-loop tests stay local-only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Host-side pytest (Ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install GCC 13 (C++20 std::format)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13 libusb-1.0-0-dev cmake ninja-build

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install scikit-build-core pybind11 numpy pytest pybind11-stubgen

      - name: Build & install wheel (editable)
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          # cmake build path mirrors CLAUDE.md's "fast dev iteration".
          # Editable install is what tests import.
          cmake --preset linux -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13
          cmake --build build -j$(nproc)
          cp build/_core.cpython-*-linux-gnu.so src/wujihandpy/
          pip install -e . --config-settings=cmake.args="-DCMAKE_C_COMPILER=gcc-13;-DCMAKE_CXX_COMPILER=g++-13"

      - name: Run pytest
        run: |
          pytest tests/ -v --ignore=tests/hil_sdk.py
