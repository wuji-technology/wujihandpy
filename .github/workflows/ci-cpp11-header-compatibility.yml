name: "Quality Gates: C++11 Header Compatibility"

on:
  push:
    branches: [main]
    paths:
      - 'wujihandcpp/include/**'
  pull_request:
    branches: [main]
    paths:
      - 'wujihandcpp/include/**'

jobs:
  cpp11-compat:
    name: Verify public headers with C++11
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Build C++11 compatibility test
        run: |
          cd wujihandcpp/tests/cpp11_compat
          mkdir -p build && cd build
          cmake ..
          cmake --build .

      - name: Run C++11 compatibility test
        run: ./wujihandcpp/tests/cpp11_compat/build/cpp11_compat_test
